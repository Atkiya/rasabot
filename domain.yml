slots:
  user_language:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: user_language
        
  department:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: department

  fee_level:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: fee_level


responses:
  utter_greet:
  - text: Hey! How are you?
  utter_cheer_up:
  - text: 'Here is something to cheer you up:'
    image: https://i.pinimg.com/736x/dc/c8/83/dcc8835ee2e73cfde9750a19f59a33ea.jpg
  utter_did_that_help:
  - text: Did that help you?
  utter_happy:
  - text: Great, carry on!
  utter_goodbye:
  - text: Bye
  utter_great:
  - text: That's great! How else can I help you?
  utter_sorry:
  - text: No problem. Is there anything else I can help you with?
  utter_affirm:
  - text: I understand. How can I assist you further?
  utter_deny:
  - text: Alright. Let me know if you have any other questions.
  utter_iamabot:
  - text: I’m an automated assistant built with Rasa. I provide up-to-date guidance
      on East West University admissions, including program details, eligibility criteria,
      application steps, required documents, deadlines, and frequently asked questions.
  
session_config:
  session_expiration_time_in_minutes: 60
  carry_over_slots_to_new_session: true
